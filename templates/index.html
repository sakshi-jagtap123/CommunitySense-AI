<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CommunitySense AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;

    /* Background Image */
    background:url("/static/images.jpeg") no-repeat center center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Dark overlay */
body::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
}

.container{
    position:relative;
    z-index:1;

    width:450px;

    background:rgba(255,255,255,0.95);

    padding:40px;

    border-radius:15px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

    text-align:center;
}

h1{
    color:#1a73e8;
    margin-bottom:10px;
}

p{
    color:#666;
    margin-bottom:30px;
}

input[type=file]{
    width:100%;
    padding:12px;
    border:2px dashed #1a73e8;
    border-radius:8px;
    margin-bottom:25px;
    cursor:pointer;
    background:#f7f9fc;
}

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:8px;

    background:#1a73e8;

    color:white;

    font-size:17px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    background:#155ac7;

    transform:scale(1.03);
}

.footer{

    margin-top:20px;

    color:#888;

    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h1>🌍 CommunitySense AI</h1>

<p>Upload your CSV dataset and generate AI-powered insights.</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file" name="file" accept=".csv" required>

<button type="submit">
🚀 Upload & Analyze
</button>

</form>

<div class="footer">
Powered by AI • Smart Data Analytics
</div>

</div>

</body>
</html>
